<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>
        body {
            background-color: antiquewhite;
        }

        .main-div {
            display: flex;
        }

        .login {
            background-color: blue;
            height: 500px;
            width: 250px;
            color: white;
            text-align: center;
            /* font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ; */
            /* padding: 30px; */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        img {
            height: 150px;
            width: 150px;
            margin-top: 100px
        }

        .white-page {
            background-color: white;
            height: 500px;
            width: 300px;
            text-align: center;
            color: lightslategrey;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

        }

        h3 {
            text-decoration: underline;

        }

        a {
            text-decoration: none;
            color: rgb(23, 23, 224);
        }

        button {
            background-color: rgb(253, 70, 4);
            border: none;
            height: 50px;
            width: 250px;
            text-align: center;
            color: white;
        }

        p {
            margin: 20px 20px 20px 30px;
        }

        .space {
            padding-top: 7rem;
        }
    </style>

    <div class="main-div">
        <div class="login">
            <h1>Login</h1>
            <p>Get access your Orders, Wishlist and recommendations</p>
            <img src="login_image.png" alt="login" srcset="">
        </div>

        <div class="white-page">
            <h3 class="h3">Enter Email/Mobile number</h3>
            <p>By continuing, you agree to Flipcart's <a href="">Terms of use</a> and <a href="">Privacy policy</a> </p>
            <button>Reqest OTP </button>
            <p class="space">New to Flipcart? <a href="">Create an account</a></p>
        </div>
    </div>

</body>

</html>
